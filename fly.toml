app = 'onli-synth'
primary_region = 'iad'

[build]

# Runtime: set MARKETSB_URL and SPECIES_URL to sim origins (see src/config/sim-env.ts).
# Smoke: entrypoint.sh runs scripts/smoke-sims.sh before Next.js. Incident response: docs/runbook-oracle-authority-mismatch.md

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  concurrency_limit = 200

# Next binds :8080 before sim smoke; grace covers sim cold start before /api/health is 200.
[[http_service.checks]]
  grace_period = "25s"
  interval = "30s"
  timeout = "5s"
  method = "GET"
  path = "/api/health"

[vm]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
